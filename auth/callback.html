<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musictify - Auth Callback</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <style>
        .callback-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #07120f 0%, #1a1a1a 100%);
        }
        .callback-box {
            text-align: center;
            color: #edf7f2;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(30, 215, 96, 0.3);
            border-top: 4px solid #1ed760;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="callback-box">
            <div class="spinner"></div>
            <h2>Completing authentication...</h2>
            <p>Please wait while we redirect you to Musictify.</p>
            <p id="errorMsg" class="error" style="display: none;"></p>
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
        // Handle OAuth callback from Clerk
        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');

            if (!code) {
                showError('No authorization code received');
                setTimeout(() => window.location.href = '../index.html', 3000);
                return;
            }

            try {
                // Exchange code for session token with our backend
                const response = await fetch(`${API_URL}/api/auth/oauth/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, state }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Authentication failed');
                }

                // Save user session
                localStorage.setItem('musictify_user', JSON.stringify({
                    ...data.user,
                    isLoggedIn: true,
                    clerkUser: true,
                    sessionToken: data.sessionToken,
                }));

                // Redirect to main app
                window.location.href = '../index.html';
            } catch (error) {
                console.error('Callback error:', error);
                showError(error.message || 'Authentication failed. Please try again.');
                setTimeout(() => window.location.href = '../index.html', 3000);
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
        }

        // Run callback handler
        handleCallback();
    </script>
</body>
</html>
