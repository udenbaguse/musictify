<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musictify</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <ul>
        <li class="brand">
          <img src="assets/images/logo.png" alt="Musictify" />
          <span>Musictify</span>
        </li>
        <li>Home</li>
        <li>About</li>
      </ul>
    </nav>

    <div class="container">
      <div class="songList">
        <h1>Best of NCS - No Copyright Sounds</h1>
        <div>
          <div class="songItem">
            <img src="assets/images/covers/10.jpg" alt="1" />
            <span>True Love</span>
            <span class="songListplay">
              <span>04:32</span><i class="far fa-play-circle"></i
            ></span>
          </div>
        </div>
      </div>
      <div class="songBanner"></div>
    </div>

    <div class="bottom">
      <input type="range" name="range" id="myProgressBar" min="0" max="100" />
      <div class="icons">
        <i class="fas fa-3x fa-backward"></i>
        <i class="fas fa-3x fa-pause-circle"></i>
        <i class="fas fa-3x fa-play-circle"></i>
        <i class="fas fa-3x fa-stop-circle"></i>
        <i class="fas fa-3x fa-step-forward"></i>
      </div>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>
